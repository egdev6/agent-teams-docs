# ──────────────────────────────────────────────────────────────────────────────
# Update Contributors
#
# Automatically refreshes the <!-- CONTRIBUTORS:START/END --> section in both
# README.md and README.es.md by querying GitHub's API for direct collaborators
# of the main `agent-teams` repository.
#
# SETUP (one-time):
#   1. Create a fine-grained Personal Access Token (PAT) with read access to
#      the `egdev6/agent-teams` repository (Members → read-only is enough).
#   2. Add it as a repository secret named `CONTRIBUTORS_TOKEN` in this repo
#      (agent-teams-docs → Settings → Secrets → Actions → New repository secret).
#
#   Without the PAT the workflow falls back to the public commit-contributors
#   endpoint, which lists users who have pushed commits (not all invited members).
# ──────────────────────────────────────────────────────────────────────────────

name: Update Contributors

on:
  # Run every Monday at 03:00 UTC so the section stays current.
  schedule:
    - cron: '0 3 * * 1'

  # Allow manual runs from the Actions tab (useful for the initial setup).
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-contributors:
    name: Refresh contributor section in READMEs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use GITHUB_TOKEN so the subsequent push is accepted.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch contributors and update READMEs
        env:
          # Primary: PAT with access to egdev6/agent-teams (reads collaborators).
          CONTRIBUTORS_TOKEN: ${{ secrets.CONTRIBUTORS_TOKEN }}
          # Fallback: standard Actions token (public endpoints only).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/update-contributors.mjs

      - name: Commit and push if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md README.es.md
          if ! git diff --staged --quiet; then
            git commit -m "chore: update contributors [skip ci]"
            git push
          else
            echo "Contributors already up to date — nothing to commit."
          fi
