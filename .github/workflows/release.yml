name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build, package, and publish release
    runs-on: ubuntu-latest
    env:
      DOCS_REPO: egdev6/agent-teams-docs
      SOURCE_REPO: egdev6/agent-teams
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION_NUM="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version_num=$VERSION_NUM" >> "$GITHUB_OUTPUT"
          echo "Release: $TAG ($VERSION_NUM)"

      - name: Checkout agent-teams source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: main
          path: agent-teams-src

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '8.15.0'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: agent-teams-src
        run: pnpm install --no-frozen-lockfile

      - name: Build monorepo
        working-directory: agent-teams-src
        run: pnpm build

      - name: Package extension
        id: package
        working-directory: agent-teams-src/packages/extension
        run: |
          pnpm exec vsce package --no-dependencies
          VSIX=$(ls *.vsix | head -1)
          echo "vsix_name=$VSIX" >> "$GITHUB_OUTPUT"
          echo "Packaged: $VSIX"

      - name: Extract CHANGELOG entry for this version
        id: changelog
        run: |
          VERSION_NUM="${{ steps.version.outputs.version_num }}"
          NOTES=$(awk "/^## (\[)?v?${VERSION_NUM//./\\.}/,/^## (\[)?v?[0-9]/" agent-teams-src/CHANGELOG.md \
            | head -n -1 \
            | tail -n +2)
          if [ -z "$NOTES" ]; then
            NOTES=$(grep -A 50 "v${VERSION_NUM}" agent-teams-src/CHANGELOG.md | head -50)
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VSIX_PATH="agent-teams-src/packages/extension/${{ steps.package.outputs.vsix_name }}"
          gh release create "$TAG" \
            --repo "$DOCS_REPO" \
            --title "Agent Teams $TAG" \
            --notes "${{ steps.changelog.outputs.notes }}" \
            "$VSIX_PATH"

      - name: Sync CHANGELOG from source repo
        run: |
          cp agent-teams-src/CHANGELOG.md CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs: sync CHANGELOG for ${{ steps.version.outputs.tag }} [skip ci]"
          git push
