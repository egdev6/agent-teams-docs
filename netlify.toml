[build]
  # Build and deploy is handled by GitHub Actions.
  # Netlify auto-builds are skipped to avoid duplicate deploys.
  ignore = "exit 0"
  publish = "build"

# Long-lived cache for hashed static assets (JS, CSS, fonts, images)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Short cache for HTML (content can change)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Short cache for sitemap/robots
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Redirect bare 404s to Docusaurus 404 page
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
